[phases.setup]
nixPkgs = ["python312", "nodejs_20", "yarn"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && yarn install"
]

[phases.build]
cmds = [
  "cd frontend && yarn build"
]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
